# Railway when Root Directory = frontend
# Dashboard: Config file path -> /frontend/railway.toml
#
# This Dockerfile bundles Go API + Next.js (UNIFIED_DEPLOY=1).
# Delete API_URL from Railway Variables — not needed.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/status"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1
