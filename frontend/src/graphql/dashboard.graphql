query DashboardPage {
  dashboard {
    patientsTotal
    appointmentsToday
    treatmentsThisMonth
    revenueThisMonth
    chairUtilization
    noShowRate
  }
  appointments(page: 1, pageSize: 50) {
    items {
      id
      patientId
      patientName
      chair
      startAt
      endAt
      type
      status
      staff
      notes
    }
  }
  treatments(page: 1, pageSize: 6) {
    items {
      id
      patientId
      patientName
      visitDate
      tooth
      procedure
      diagnosis
      fee
      staff
      status
      tags
    }
  }
}

query HealthCheck {
  health {
    ok
    service
    version
  }
}
