query AppointmentsPage($date: String, $page: Int, $pageSize: Int) {
  appointments(date: $date, page: $page, pageSize: $pageSize) {
    items {
      id
      patientId
      patientName
      chair
      startAt
      endAt
      type
      status
      staff
      staffRole
      notes
      noShow
      cancelReason
      cancelledAt
    }
    pageInfo {
      total
      page
      pageSize
      totalPages
    }
  }
}
