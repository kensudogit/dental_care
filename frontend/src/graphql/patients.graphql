fragment PageInfoFields on PageInfo {
  total
  page
  pageSize
  totalPages
}

query PatientsPage($page: Int, $pageSize: Int) {
  patients(page: $page, pageSize: $pageSize) {
    items {
      id
      chartNo
      name
      kana
      birthDate
      phone
      email
      allergies
      notes
      lastVisit
      createdAt
    }
    pageInfo {
      ...PageInfoFields
    }
  }
}

query PatientDetail($id: ID!) {
  patient(id: $id) {
    id
    chartNo
    name
    kana
    birthDate
    phone
    email
    allergies
    notes
    lastVisit
    createdAt
  }
  treatments(patientId: $id, page: 1, pageSize: 50) {
    items {
      id
      visitDate
      tooth
      procedure
      diagnosis
      fee
      staff
      status
      tags
    }
    pageInfo {
      ...PageInfoFields
    }
  }
}
