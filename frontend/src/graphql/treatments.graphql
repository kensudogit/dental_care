query TreatmentsPage($page: Int, $pageSize: Int) {
  treatments(page: $page, pageSize: $pageSize) {
    items {
      id
      patientId
      patientName
      visitDate
      tooth
      procedure
      diagnosis
      fee
      staff
      status
      tags
    }
    pageInfo {
      total
      page
      pageSize
      totalPages
    }
  }
}
