fragment TreatmentFields on TreatmentRecord {
  id
  patientId
  patientName
  visitDate
  tooth
  procedure
  procedureCode
  diagnosis
  fee
  staff
  status
  tags
  subjective
  objective
  assessment
  plan
  toothChartJson
}

query TreatmentsPage($page: Int, $pageSize: Int) {
  treatments(page: $page, pageSize: $pageSize) {
    items {
      ...TreatmentFields
    }
    pageInfo {
      total
      page
      pageSize
      totalPages
    }
  }
}

query PatientKartePage($patientId: ID!, $page: Int, $pageSize: Int) {
  patient(id: $patientId) {
    id
    name
    chartNo
    kana
  }
  treatments(patientId: $patientId, page: $page, pageSize: $pageSize) {
    items {
      ...TreatmentFields
    }
    pageInfo {
      total
      page
      pageSize
      totalPages
    }
  }
  xrayImages(patientId: $patientId) {
    id
    patientId
    title
    imageUrl
    imageType
    toothRegion
    takenAt
    notes
    createdAt
    updatedAt
  }
  perioExams(patientId: $patientId) {
    id
    patientId
    examDate
    staff
    notes
    sites {
      tooth
      pdMesial
      pdBuccal
      pdDistal
      pdLingual
      bop
      mobility
    }
    createdAt
  }
}

query TreatmentRecord($id: ID!) {
  treatment(id: $id) {
    ...TreatmentFields
  }
}

mutation CreateTreatment($input: CreateTreatmentInput!) {
  createTreatment(input: $input) {
    ...TreatmentFields
  }
}

mutation UpdateTreatment($input: UpdateTreatmentInput!) {
  updateTreatment(input: $input) {
    ...TreatmentFields
  }
}

mutation DeleteTreatment($id: ID!) {
  deleteTreatment(id: $id) {
    id
    patientId
  }
}
