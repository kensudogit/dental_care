# Railway config for Web (Next.js) service
#
# Dashboard settings (IMPORTANT):
#   Root Directory     →  leave EMPTY (repository root). Do NOT set "frontend"
#   Config file path   →  /railway.toml
#
# If Root Directory is "frontend", use /frontend/railway.toml (frontend/Dockerfile).
# Build error `"/frontend/package.json": not found` → Root is "frontend" but
# this file (/railway.toml) is used. Switch Config file to /frontend/railway.toml
# OR clear Root Directory and keep /railway.toml.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["frontend/**", "graphql/**", "Dockerfile"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1

# Required Variables (Dashboard -> Web service -> Variables):
#   API_URL = https://${{api.RAILWAY_PUBLIC_DOMAIN}}
# Replace "api" with your API service name if different.
# Optional (private network instead of public URL):
#   API_INTERNAL_HOST = api.railway.internal
#   API_INTERNAL_PORT = ${{api.PORT}}
