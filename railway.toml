# Railway config for Web (Next.js) service
#
# Dashboard settings (IMPORTANT):
#   Root Directory     →  leave EMPTY (repository root). Do NOT set "frontend"
#   Config file path   →  /railway.toml
#
# If Root Directory is "frontend", build fails:
#   couldn't locate the dockerfile at path frontend/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["frontend/**", "graphql/**", "Dockerfile"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1
