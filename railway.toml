# Railway — Web UI + API in ONE service (recommended if / shows Go JSON)
#
# dental_care service Settings:
#   Root Directory     →  leave EMPTY
#   Config file path   →  /railway.toml
#
# After deploy: open your Web URL — you should see the dashboard, not JSON.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["frontend/**", "backend/**", "graphql/**", "scripts/**", "Dockerfile.unified"]

[deploy]
healthcheckPath = "/status"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1

# API_URL is not required (Go API runs in the same container on 127.0.0.1:8081).
# Do not set API_URL on Railway Variables for unified deploy.
